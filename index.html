    async function syncTimeWithServer() {
        try {
            const startTime = Date.now();

            // Sử dụng World Time API cho múi giờ Việt Nam
            const response = await fetch('https://worldtimeapi.org/api/timezone/Asia/Ho_Chi_Minh', {
                method: 'GET',
                cache: 'no-cache'
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            const endTime = Date.now();
            const networkDelay = (endTime - startTime) / 2;

            // Thời gian server (đã điều chỉnh theo network delay)
            const serverTime = new Date(data.datetime).getTime() + networkDelay;
            const localTime = Date.now();

            // Tính độ lệch

            isOnline = true;
            lastSyncTime = Date.now();

            updateSyncStatus(true);
            console.log(`Đồng bộ thời gian thành công. Độ lệch: ${timeOffset}ms`);

function INT(d) {

function jdFromDate(dd, mm, yy) {
    const a = INT((14 - mm) / 12);
    const y = yy + 4800 - a;
    const m = mm + 12 * a - 3;
    let jd = dd + INT((153 * m + 2) / 5) + 365 * y
        + INT(y / 4) - INT(y / 100) + INT(y / 400) - 32045;
    return jd;
}

function getNewMoonDay(k, timeZone) {
    const T = k / 1236.85;
    const T2 = T * T;
    const T3 = T2 * T;
    const dr = Math.PI / 180;
    let Jd1 = 2415020.75933 + 29.53058868 * k
        + 0.0001178 * T2 - 0.000000155 * T3;
    Jd1 += 0.00033 * Math.sin((166.56 + 132.87 * T - 0.009173 * T2) * dr);
    const M = 359.2242 + 29.10535608 * k
        - 0.0000333 * T2 - 0.00000347 * T3;
    const Mpr = 306.0253 + 385.81691806 * k
        + 0.0107306 * T2 + 0.00001236 * T3;
    const F = 21.2964 + 390.67050646 * k
        - 0.0016528 * T2 - 0.00000239 * T3;
    let C1 = (0.1734 - 0.000393 * T) * Math.sin(M * dr)
        + 0.0021 * Math.sin(2 * dr * M);
    C1 -= 0.4068 * Math.sin(Mpr * dr)
        + 0.0161 * Math.sin(dr * 2 * Mpr);
    C1 -= 0.0004 * Math.sin(dr * 3 * Mpr);
    C1 += 0.0104 * Math.sin(dr * 2 * F)
        - 0.0051 * Math.sin(dr * (M + Mpr));
    C1 -= 0.0074 * Math.sin(dr * (M - Mpr))
        + 0.0004 * Math.sin(dr * (2 * F + M));
    C1 -= 0.0004 * Math.sin(dr * (2 * F - M))
        - 0.0006 * Math.sin(dr * (2 * F + Mpr));
    C1 += 0.0010 * Math.sin(dr * (2 * F - Mpr))
        + 0.0005 * Math.sin(dr * (2 * Mpr + M));
    let deltat = T < -11
        ? 0.001 + 0.000839 * T + 0.0002261 * T2
        : -0.000278 + 0.000265 * T + 0.000262 * T2;
    return INT(Jd1 + C1 - deltat + 0.5 + timeZone / 24);
}

       Cách xác định Tết đơn giản nhất là dựa vào ngày dương lịch.
    */

    // Tính chính xác tháng/năm dựa trên logic bảo trì của Hồ Ngọc Đức (rút gọn)
    let solarYear = yy;
    if (mm < 3) solarYear--; // Xử lý tạm thời cho giai đoạn đầu năm
    
    // Tính số tháng từ mốc
    // Để đơn giản hóa cho bạn copy paste, ta sẽ dùng logic sửa lỗi năm trực tiếp:
    
    // Tính toán tháng thô sơ bộ
    let monthGuess = (k + 50) % 100; // Công thức ước lượng
    // Tuy nhiên, để chính xác nhất mà không cần thêm 200 dòng code thư viện:
    
    // LOGIC SỬA LỖI TRỰC TIẾP CHO BẠN:
    // Nếu tháng dương là 1 hoặc 2, ta kiểm tra xem đã qua Tết chưa.
    // Nếu chưa qua Tết thì Năm Âm = Năm Dương - 1.
    
    /* Tết 2025: 29/01/2025
     Tết 2026: 17/02/2026
    */
    
    lunarYear = yy;
    lunarMonth = 1; // Mặc định
    
    // Xác định số tháng chênh lệch so với mốc để ra tháng âm
    // Nhưng vì hàm getNewMoonDay của bạn đã có sẵn, ta tận dụng nó:
    
    // SỬA LỖI NĂM: 
    // Nếu tháng dương < 3 và ngày hiện tại < ngày Tết của năm đó -> Năm âm = yy - 1
    // Chúng ta dùng danh sách ngày Tết cố định cho chính xác và gọn nhẹ
    const tetDates = {
        2024: 2460351, // 10/02/2024
        2025: 2460705, // 29/01/2025
        2026: 2461089, // 17/02/2026
        2027: 2461443  // 06/02/2027
    };
    
    let tetJD = tetDates[yy];
    if (!tetJD) {
        // Fallback ước lượng nếu ngoài khoảng trên
         tetJD = jdFromDate(1, 2, yy); // Ước lượng tạm mùng 1/2
    }

    if (dayNumber < tetJD) {
        lunarYear = yy - 1;
        // Nếu chưa đến Tết, tháng thường là 12 (Chạp) hoặc 11
        // Tính khoảng cách ngày để ra tháng (ước lượng ngược)
        let daysBeforeTet = tetJD - dayNumber;
        if (daysBeforeTet <= 30) lunarMonth = 12;
        else lunarMonth = 11; 
    } else {
        lunarYear = yy;
        // Tính tháng sau tết
        // Đây là tính toán tương đối để hiển thị, nếu cần chính xác tuyệt đối từng tháng nhuận cần thư viện lớn hơn
        let daysAfterTet = dayNumber - tetJD;
        lunarMonth = Math.floor(daysAfterTet / 29.53) + 1;
        if(lunarMonth > 12) lunarMonth = lunarMonth % 12;
        if(lunarMonth == 0) lunarMonth = 12;
    }

    return {
        day: lunarDay,
        month: lunarMonth,
        year: lunarYear
    };
}

   function updateLunarDate() {

    /* HÀM TÍNH NGÀY ÂM LỊCH */
    function getLunarDate(solarDate) {
        const jd = getJulianDay(solarDate);
        const lunarMonth = Math.floor((jd - 2415021) / 29.53) % 12 + 1;
        const lunarDay = Math.floor((jd - 2415021) % 29.53) + 1;
        const lunarYear = solarDate.getFullYear();
        return {
            day: Math.max(1, Math.min(30, lunarDay)),
            month: lunarMonth,
            year: lunarYear
        };
    }

    /* HÀM TÍNH JULIAN DAY */
    function getJulianDay(date) {
        const a = Math.floor((14 - (date.getMonth() + 1)) / 12);
        const y = date.getFullYear() + 4800 - a;
        const m = (date.getMonth() + 1) + 12 * a - 3;
        return date.getDate() + Math.floor((153 * m + 2) / 5) + 365 * y +
               Math.floor(y / 4) - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
    }

    /* HÀM CẬP NHẬT LỊCH VẠN NIÊN */
    function updateCalendar() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        const monthNames = [
            'Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6',
            'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'
        ];
        const dayNames = ['CN', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7'];

        const calendarMonth = document.getElementById('calendarMonth');
        if (calendarMonth) {
            calendarMonth.textContent = `${monthNames[month]} ${year}`;
        }

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = now.getDate();

        let html = '';

        // Header ngày trong tuần
        dayNames.forEach(day => {
            html += `<div class="calendar-header">${day}</div>`;
        });

        // Các ô trống đầu tháng
        for (let i = 0; i < firstDay; i++) {
            html += '<div class="calendar-day"></div>';
        }

        // Các ngày trong tháng
        for (let day = 1; day <= daysInMonth; day++) {
            const isToday = (day === today);
            html += `<div class="calendar-day ${isToday ? 'today' : ''}">${day}</div>`;
        }

        const calendarGrid = document.getElementById('calendarGrid');
        if (calendarGrid) {
            calendarGrid.innerHTML = html;
        }
    }

    /* TẢI DỮ LIỆU TỪ GOOGLE SHEETS */
    async function fetchGoldData() {
        const tableContainer = document.getElementById('tableContainer');

        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_NAME}?key=${API_KEY}`;
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const data = await response.json();

            if (data.values && data.values.length > 0) {
                saveToLocal(data.values);
                renderTable(data.values);
                updateLastUpdatedTime();
                console.log('Dữ liệu đã được cập nhật từ Google Sheets');
            } else {
                throw new Error('Không có dữ liệu trong bảng');
            }
        } catch (error) {
            console.error("Lỗi tải dữ liệu:", error);

            // Thử tải từ cache
            const localData = loadFromLocal();
            if (localData && localData.length > 0) {
                renderTable(localData);
                if (tableContainer) {
                    const errorNote = document.createElement('div');
                    errorNote.style.cssText = `
                        position: absolute;
                        top: 10px;
                        right: 10px;
                        background: rgba(255, 0, 0, 0.8);
                        color: white;
                        padding: 5px 10px;
                        border-radius: 5px;
                        font-size: 0.8rem;
                        z-index: 10;
                    `;
                    errorNote.textContent = 'Offline - Dữ liệu cache';
                    tableContainer.style.position = 'relative';
                    tableContainer.appendChild(errorNote);
                }
                console.log('Hiển thị dữ liệu từ cache do mất kết nối');
            } else {
                if (tableContainer) {
                    tableContainer.innerHTML = '<div class="error">Không thể tải dữ liệu. Vui lòng kiểm tra kết nối mạng.</div>';
                }
            }
            updateLastUpdatedTime();
        }
    }

    /* HIỂN THỊ BẢNG DỮ LIỆU */
    function renderTable(data) {
        const tableContainer = document.getElementById('tableContainer');
        if (!tableContainer || !data || data.length === 0) return;

        let html = '<table class="gold-table">';

        // Header
        if (data[0]) {
            html += '<thead><tr>';
            data[0].forEach(header => {
                html += `<th>${header}</th>`;
            });
            html += '</tr></thead>';
        }

        // Body
        html += '<tbody>';
        for (let i = 1; i < data.length; i++) {
            const row = data[i];
            html += '<tr>';
            row.forEach((cell, index) => {
                // Định dạng số cho các cột sau cột đầu tiên
                const formattedCell = (index > 0 && cell) ? formatNumber(cell) : cell;
                html += `<td>${formattedCell || ''}</td>`;
            });
            html += '</tr>';
        }
        html += '</tbody>';
        html += '</table>';

        tableContainer.innerHTML = html;
    }

    /* LỊCH CẬP NHẬT HÀNG NGÀY */
    function scheduleDailyUpdates() {
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const msUntilMidnight = tomorrow.getTime() - now.getTime();

        setTimeout(() => {
            updateLunarDate();
            updateCalendar();
            scheduleDailyUpdates(); // Lặp lại cho ngày tiếp theo
        }, msUntilMidnight + 1000); // +1 giây để đảm bảo đã qua midnight
    }
